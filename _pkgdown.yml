url: https://ntiGideon.github.io/ReproStat

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary:        "#2C7FB8"
    secondary:      "#1B9E77"
    success:        "#41B6C4"
    info:           "#7FCDBB"
    base_font:      {google: "Inter"}
    heading_font:   {google: "Inter"}
    code_font:      {google: "Fira Code"}
    border-radius:  "0.5rem"
  includes:
    in_header: |
      <meta name="description"
            content="ReproStat: R package for reproducibility diagnostics
                     in statistical modeling.">

home:
  title: "ReproStat — Reproducibility Diagnostics for Statistical Modeling"
  description: >
    An R package that diagnoses how stable a statistical model's outputs are
    under data perturbations. Computes coefficient, p-value, selection, and
    prediction stability, plus a composite Reproducibility Index (0–100).
  links:
    - text: "CRAN"
      href: https://cran.r-project.org/package=ReproStat
    - text: "Report a bug"
      href: https://github.com/ntiGideon/ReproStat/issues
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [intro, articles, reference, news]
    right: [search, github]
  components:
    intro:
      text: "Get started"
      href: articles/ReproStat-intro.html
    articles:
      text: Articles
      menu:
        - text: "Introduction to ReproStat"
          href: articles/ReproStat-intro.html
        - text: "─────────────────"
        - text: "Backends"
        - text: "Using lm and glm backends"
          href: articles/ReproStat-intro.html#backends
        - text: "Using rlm (robust regression)"
          href: articles/ReproStat-intro.html#robust-regression
        - text: "Using glmnet (LASSO / ridge)"
          href: articles/ReproStat-intro.html#penalized-regression
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: Changelog
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/ntiGideon/ReproStat
      aria-label: GitHub

reference:
  - title: "Core workflow"
    desc: >
      The main pipeline: perturb data → run diagnostics → extract metrics.
    contents:
      - run_diagnostics
      - perturb_data

  - title: "Stability metrics"
    desc: >
      Four metrics computed from a `reprostat` object returned by
      `run_diagnostics()`. Each captures a different dimension of stability.
    contents:
      - coef_stability
      - pvalue_stability
      - selection_stability
      - prediction_stability

  - title: "Reproducibility Index"
    desc: >
      Composite index (0–100) aggregating all four stability components,
      plus a bootstrap confidence interval.
    contents:
      - reproducibility_index
      - ri_confidence_interval

  - title: "Cross-validation ranking stability"
    desc: >
      Compare multiple candidate models via repeated K-fold CV and assess
      how consistently each model ranks as the best.
    contents:
      - cv_ranking_stability

  - title: "Visualisation"
    desc: >
      Base-graphics and ggplot2 plots for stability diagnostics and CV results.
    contents:
      - plot_stability
      - plot_stability_gg
      - plot_cv_stability
      - plot_cv_stability_gg

  - title: "S3 methods"
    desc: "Methods for the `reprostat` S3 class."
    contents:
      - print.reprostat

  - title: "Package"
    desc: "Package-level documentation."
    contents:
      - ReproStat-package

footer:
  structure:
    left:  [package]
    right: [developed_by, built_with]
  components:
    package: >
      **ReproStat** is licensed under
      [GPL (>= 3)](https://www.gnu.org/licenses/gpl-3.0.html).

news:
  releases:
    - text: "Version 0.1.0"
      href: https://github.com/ntiGideon/ReproStat/releases/tag/v0.1.0

authors:
  "Gideon Nti Boateng":
    href: mailto:gidiboateng200@gmail.com
