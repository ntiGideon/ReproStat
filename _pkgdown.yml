url: https://ntiGideon.github.io/ReproStat

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2C7FB8"
    secondary: "#1B9E77"
    success: "#41B6C4"
    info: "#7FCDBB"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "Fira Code"}
    border-radius: "0.5rem"
  includes:
    in_header: |
      <meta name="description"
            content="ReproStat is an R package for reproducibility diagnostics in statistical modeling, with perturbation-based stability metrics, a reproducibility index, and repeated CV ranking stability.">

home:
  title: "ReproStat - Reproducibility Diagnostics for Statistical Modeling"
  description: >
    ReproStat helps analysts assess how stable model outputs remain under
    bootstrap, subsampling, and noise perturbations. It provides
    coefficient, p-value, selection, and prediction stability diagnostics,
    a composite Reproducibility Index, and repeated CV ranking stability
    for model comparison.
  strip_header: false
  links:
    - text: "CRAN"
      href: https://cran.r-project.org/package=ReproStat
    - text: "GitHub"
      href: https://github.com/ntiGideon/ReproStat
    - text: "Report an issue"
      href: https://github.com/ntiGideon/ReproStat/issues
  sidebar:
    structure: [links, license, citation, authors, dev]

navbar:
  structure:
    left: [get-started, articles, reference, news]
    right: [search, github]
  components:
    get-started:
      text: "Get Started"
      href: articles/ReproStat-intro.html
    articles:
      text: "Articles"
      menu:
        - text: "Introduction"
          href: articles/ReproStat-intro.html
        - text: "Interpreting Outputs"
          href: articles/interpreting-reprostat.html
        - text: "Backend Guide"
          href: articles/backend-guide.html
        - text: "Workflow Patterns"
          href: articles/workflow-patterns.html
    reference:
      text: "Reference"
      href: reference/index.html
    news:
      text: "Changelog"
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/ntiGideon/ReproStat
      aria-label: "GitHub repository"

reference:
  - title: "Start Here"
    desc: >
      Core entry points for fitting diagnostics, summarizing them, and
      understanding the package.
    contents:
      - ReproStat-package
      - run_diagnostics
      - print.reprostat

  - title: "Data Perturbation"
    desc: >
      Functions for generating perturbed datasets and choosing a perturbation
      design that matches the stability question you want to ask.
    contents:
      - perturb_data

  - title: "Stability Metrics"
    desc: >
      Component-level summaries of how coefficients, significance decisions,
      predictor behavior, and predictions vary across perturbations.
    contents:
      - coef_stability
      - pvalue_stability
      - selection_stability
      - prediction_stability

  - title: "Composite Summary"
    desc: >
      Aggregate the component diagnostics into a Reproducibility Index and
      quantify uncertainty in that summary.
    contents:
      - reproducibility_index
      - ri_confidence_interval

  - title: "Model Comparison"
    desc: >
      Repeated cross-validation tools for comparing candidate formulas by
      ranking stability rather than average error alone.
    contents:
      - cv_ranking_stability
      - plot_cv_stability
      - plot_cv_stability_gg

  - title: "Visualization"
    desc: >
      Plotting helpers for inspecting the stability structure of a fitted
      ReproStat object.
    contents:
      - plot_stability
      - plot_stability_gg

news:
  releases:
    - text: "Version 0.1.0"
      href: https://github.com/ntiGideon/ReproStat/releases/tag/v0.1.0

footer:
  structure:
    left: [package]
    right: [developed_by, built_with]
  components:
    package: >
      **ReproStat** is licensed under
      [GPL (>= 3)](https://www.gnu.org/licenses/gpl-3.0.html).

authors:
  "Gideon Nti Boateng":
    href: mailto:gidiboateng200@gmail.com
